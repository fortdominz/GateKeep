services:
  - type: web
    name: gatekeep-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: INSIGHTFACE_MODEL
        value: buffalo_sc
      - key: ADMIN_PASSWORD
        sync: false
