services:
  - type: web
    name: gatekeep-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GATEKEEP_DATA_DIR
        value: /data
      - key: INSIGHTFACE_HOME
        value: /data/.insightface
      - key: ADMIN_PASSWORD
        sync: false   # Set this in the Render dashboard — never commit the value
    disk:
      name: gatekeep-data
      mountPath: /data
      sizeGB: 2
